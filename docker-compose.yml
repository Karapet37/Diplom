services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autograph-backend
    env_file:
      - .env
    environment:
      WEB_HOST: "0.0.0.0"
      WEB_PORT: "8008"
      AUTH_ENABLE: "${AUTH_ENABLE:-0}"
      AUTH_PROTECT_WRITE_ONLY: "${AUTH_PROTECT_WRITE_ONLY:-1}"
      AUTH_JWT_SECRET: "${AUTH_JWT_SECRET:-change-me}"
      AUTH_JWT_ISSUER: "${AUTH_JWT_ISSUER:-autograph}"
      AUTH_USER: "${AUTH_USER:-admin}"
      AUTH_PASSWORD: "${AUTH_PASSWORD:-change-me}"
      RATE_LIMIT_ENABLE: "${RATE_LIMIT_ENABLE:-1}"
      RATE_LIMIT_BACKEND: "${RATE_LIMIT_BACKEND:-slowapi}"
      RATE_LIMIT_PER_MINUTE: "${RATE_LIMIT_PER_MINUTE:-240}"
      PRIVACY_NOISE_ENABLE: "${PRIVACY_NOISE_ENABLE:-0}"
      PRIVACY_NOISE_INTENSITY: "${PRIVACY_NOISE_INTENSITY:-0.05}"
    command: ["python", "start.py", "--web-api", "--host", "0.0.0.0", "--port", "8008"]
    expose:
      - "8008"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - ./data:/app/data
      - ./runtime:/app/runtime
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8008/api/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: autograph-nginx
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NGINX_TLS_ENABLE: "${NGINX_TLS_ENABLE:-0}"
      NGINX_SERVER_NAME: "${NGINX_SERVER_NAME:-_}"
      NGINX_TLS_CERT_FILE: "${NGINX_TLS_CERT_FILE:-/etc/nginx/certs/fullchain.pem}"
      NGINX_TLS_KEY_FILE: "${NGINX_TLS_KEY_FILE:-/etc/nginx/certs/privkey.pem}"
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    command: ["/bin/sh", "/etc/nginx/start-nginx.sh"]
    volumes:
      - ./infra/nginx/nginx-http.conf:/etc/nginx/nginx-http.conf:ro
      - ./infra/nginx/nginx-https.conf:/etc/nginx/nginx-https.conf:ro
      - ./infra/nginx/start-nginx.sh:/etc/nginx/start-nginx.sh:ro
      - ./infra/nginx/certs:/etc/nginx/certs:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: autograph-prometheus
    depends_on:
      backend:
        condition: service_healthy
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    container_name: autograph-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

volumes:
  prometheus-data:
  grafana-data:
